info.app:
  name: HMPPS Warrant Risk Assessment Api
  version: 1.0

spring:
  application:
    name: hmpps-warrant-risk-assessment-api

#  This jackson configuration is only applied for java.util.Date.
#  It is ignored for LocalDateTime, and therefore unnecessary for most projects
  jackson:
    date-format: "yyyy-MM-dd HH:mm:ss"
    serialization:
      WRITE_DATES_AS_TIMESTAMPS: false

  datasource:
    url: 'jdbc:postgresql://${database.endpoint:localhost:5432}/${database.name:postgres}'
    username: '${database.username:postgres}'
    password: '${database.password:postgres}'

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${hmpps-auth.url}/.well-known/jwks.json

      client:
        registration:
          default:
            provider: hmpps-auth
            authorization-grant-type: client_credentials
            client-id: ${hmpps-auth.client-id}
            client-secret: ${hmpps-auth.client-secret}
        provider:
          hmpps-auth:
            token-uri: ${hmpps-auth.url}/oauth/token
  http:
    codecs:
      max-in-memory-size: 10MB
  web:
    error:
      include-message: always

server:
  port: 8080
  servlet:
    context-path: /
  forward-headers-strategy: native
  tomcat:
    remoteip:
      remote-ip-header: x-forwarded-for
      protocol-header: x-forwarded-proto
      internal-proxies: 10\.\d{1,3}\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}|169\.254\.\d{1,3}\.\d{1,3}|127\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.1[6-9]{1}\.\d{1,3}\.\d{1,3}|172\.2[0-9]{1}\.\d{1,3}\.\d{1,3}|172\.3[0-1]{1}\.\d{1,3}\.\d{1,3}|0:0:0:0:0:0:0:1|::1|100\.6[4-9]\.\d{1,3}\.\d{1,3}|100\.[7-9][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.1[0-1][0-9]{1}\.\d{1,3}\.\d{1,3}|100\.12[0-7]\.\d{1,3}\.\d{1,3}
  shutdown: graceful

management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: 'info, health'
  endpoint:
    health:
      cache:
        time-to-live: 2000ms
      show-components: always
      show-details: always
      probes:
        enabled: true
    info:
      cache:
        time-to-live: 2000ms

application:
  notify:
    warrant-risk-assessment:
      template: 6c66ee34-f165-466c-8127-80c585e6015b

hmpps.sar.additionalAccessRole: WARRANT_RISK_ASSESSMENT

---
spring.config.activate.on-profile: dev
hmpps-auth.url: http://localhost:9090/auth
frontend.url: http://localhost:3000
gotenberg.url: http://localhost:8072
ndelius-integration-api.url: http://localhost:9101
database.endpoint: localhost:5432

---
spring.config.activate.on-profile: test
hmpps-auth.url: http://localhost:9101/auth
frontend.url: http://localhost:3000
gotenberg.url: http://localhost:9101
ndelius-integration-api.url: http://localhost:9101
spring.datasource.url: jdbc:tc:postgresql:17:///db

---
spring.config.activate.on-profile: [test, dev]
hmpps.sqs:
  provider: localstack
  queues:
    hmppswarrantriskassessmentqueue:
      queueName: hmpps-warrant-risk-assessment-queue
      dlqName: hmpps-warrant-risk-assessment-queue-dlq
      subscribeTopicId: hmppswarrantriskassessmenttopic
    hmppswarrantriskassessmentpublishqueue:
      queueName: hmpps-warrant-risk-assessment-publish-queue
      dlqName: hmpps-warrant-risk-assessment-publish-queue-dlq
      subscribeTopicId: hmppswarrantriskassessmentpublishtopic
    audit:
      queueName: audit-queue
  topics:
    hmppswarrantriskassessmenttopic:
      arn: arn:aws:sns:eu-west-2:000000000000:hmppswarrantriskassessmenttopic
    hmppswarrantriskassessmentpublishtopic:
      arn: arn:aws:sns:eu-west-2:000000000000:hmppswarrantriskassessmentpublishtopic